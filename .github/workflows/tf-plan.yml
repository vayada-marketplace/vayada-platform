name: Terraform Plan

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/tf-plan.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: eu-west-1

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::269416271598:role/vayada-github-actions-platform-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Terraform init
        run: terraform init
        working-directory: infra

      - name: Terraform plan
        id: plan
        run: |
          set -o pipefail
          terraform plan -no-color -out=tfplan 2>&1 | tee plan.txt
        working-directory: infra
        env:
          TF_VAR_db_master_password: ${{ secrets.TF_VAR_DB_MASTER_PASSWORD }}
          TF_VAR_db_booking_password: ${{ secrets.TF_VAR_DB_BOOKING_PASSWORD }}
          TF_VAR_db_pms_password: ${{ secrets.TF_VAR_DB_PMS_PASSWORD }}
          TF_VAR_db_auth_password: ${{ secrets.TF_VAR_DB_AUTH_PASSWORD }}
          TF_VAR_jwt_secret_key: ${{ secrets.TF_VAR_JWT_SECRET_KEY }}
          TF_VAR_smtp_username: ${{ secrets.TF_VAR_SMTP_USERNAME }}
          TF_VAR_smtp_password: ${{ secrets.TF_VAR_SMTP_PASSWORD }}
          TF_VAR_stripe_secret_key: ${{ secrets.TF_VAR_STRIPE_SECRET_KEY }}
          TF_VAR_stripe_publishable_key: ${{ secrets.TF_VAR_STRIPE_PUBLISHABLE_KEY }}
          TF_VAR_stripe_webhook_secret: ${{ secrets.TF_VAR_STRIPE_WEBHOOK_SECRET }}
          TF_VAR_stripe_platform_account_id: ${{ secrets.TF_VAR_STRIPE_PLATFORM_ACCOUNT_ID }}
          TF_VAR_target_backend_desired_count: ${{ secrets.TF_VAR_TARGET_BACKEND_DESIRED_COUNT || '0' }}
          TF_VAR_target_backend_staging_secrets_preprovisioned: ${{ secrets.TF_VAR_TARGET_BACKEND_STAGING_SECRETS_PREPROVISIONED || 'false' }}
          TF_VAR_target_backend_production_cutover_enabled: ${{ secrets.TF_VAR_TARGET_BACKEND_PRODUCTION_CUTOVER_ENABLED || 'false' }}
          TF_VAR_manage_staging_rehearsal_secrets: ${{ secrets.TF_VAR_MANAGE_STAGING_REHEARSAL_SECRETS || 'false' }}
          TF_VAR_enable_staging_pms_runtime: ${{ secrets.TF_VAR_ENABLE_STAGING_PMS_RUNTIME || 'false' }}
          TF_VAR_staging_target_database_url: ${{ secrets.TF_VAR_STAGING_TARGET_DATABASE_URL }}
          TF_VAR_staging_pms_database_url: ${{ secrets.TF_VAR_STAGING_PMS_DATABASE_URL }}
          TF_VAR_staging_pms_auth_database_url: ${{ secrets.TF_VAR_STAGING_PMS_AUTH_DATABASE_URL }}
          TF_VAR_staging_pms_booking_engine_database_url: ${{ secrets.TF_VAR_STAGING_PMS_BOOKING_ENGINE_DATABASE_URL }}
          TF_VAR_staging_stripe_webhook_secret: ${{ secrets.TF_VAR_STAGING_STRIPE_WEBHOOK_SECRET }}
          TF_VAR_staging_xendit_webhook_secret: ${{ secrets.TF_VAR_STAGING_XENDIT_WEBHOOK_SECRET }}
          TF_VAR_staging_channex_webhook_secret: ${{ secrets.TF_VAR_STAGING_CHANNEX_WEBHOOK_SECRET }}
          TF_VAR_target_database_url: ${{ secrets.TF_VAR_TARGET_DATABASE_URL }}
          TF_VAR_workos_api_key: ${{ secrets.TF_VAR_WORKOS_API_KEY }}
          TF_VAR_workos_webhook_secret: ${{ secrets.TF_VAR_WORKOS_WEBHOOK_SECRET }}
          TF_VAR_workos_client_id: ${{ secrets.TF_VAR_WORKOS_CLIENT_ID }}
          TF_VAR_workos_audience: ${{ secrets.TF_VAR_WORKOS_AUDIENCE }}
          TF_VAR_workos_issuer: ${{ secrets.TF_VAR_WORKOS_ISSUER }}
          TF_VAR_workos_jwks_url: ${{ secrets.TF_VAR_WORKOS_JWKS_URL }}
          TF_VAR_auth_cookie_secret: ${{ secrets.TF_VAR_AUTH_COOKIE_SECRET }}
          TF_VAR_openai_api_key: ${{ secrets.TF_VAR_OPENAI_API_KEY }}
          TF_VAR_ask_intelligence_provider: ${{ secrets.TF_VAR_ASK_INTELLIGENCE_PROVIDER || 'fixture' }}
          TF_VAR_ask_intelligence_model: ${{ secrets.TF_VAR_ASK_INTELLIGENCE_MODEL }}
          TF_VAR_openai_base_url: ${{ secrets.TF_VAR_OPENAI_BASE_URL }}
          TF_VAR_openai_organization: ${{ secrets.TF_VAR_OPENAI_ORGANIZATION }}
          TF_VAR_openai_project: ${{ secrets.TF_VAR_OPENAI_PROJECT }}
          TF_VAR_cloudflare_api_token: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
          TF_VAR_enable_cloudflare_dns: ${{ secrets.TF_VAR_ENABLE_CLOUDFLARE_DNS || 'false' }}
          TF_VAR_channex_api_key: ${{ secrets.TF_VAR_CHANNEX_API_KEY }}
          TF_VAR_anthropic_api_key: ${{ secrets.TF_VAR_ANTHROPIC_API_KEY }}
          TF_VAR_firecrawl_api_key: ${{ secrets.TF_VAR_FIRECRAWL_API_KEY }}

      - name: Post plan to PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n\n... (truncated)' : plan;
            const output = `#### Terraform Plan \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${truncated}
            \`\`\`

            </details>

            *Triggered by @${{ github.actor }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
